<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON SCOUTER — 戦闘力測定器</title>
    <meta name="google-adsense-account" content="ca-pub-6518093363642087">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6518093363642087" crossorigin="anonymous"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Rajdhani:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06060a;
            --surface: #0e0e18;
            --surface2: #14141f;
            --border: rgba(255, 110, 0, 0.2);
            --border2: rgba(255, 255, 255, 0.05);
            --orange: #ff6e00;
            --orange2: #ffaa00;
            --yellow: #ffe600;
            --red: #ff2222;
            --text: #f0ece4;
            --muted: rgba(240, 236, 228, 0.5);
            --muted2: rgba(240, 236, 228, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景エフェクト */
        .bg-fx {
            position: fixed; inset: 0; pointer-events: none;
            background: 
                radial-gradient(ellipse 55% 45% at 15% 40%, rgba(255, 110, 0, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 45% 55% at 85% 60%, rgba(0, 229, 255, 0.03) 0%, transparent 70%);
            animation: bgp 6s ease-in-out infinite alternate;
        }
        @keyframes bgp { from { opacity: .5; } to { opacity: 1; } }

        nav {
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex; align-items: center;
            height: 60px;
            background: rgba(6, 6, 10, 0.9);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        .nav-logo {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 20px;
            background: linear-gradient(135deg, var(--yellow), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 150, 0, 0.4));
            margin-right: auto;
        }

        .nav-tabs { display: flex; height: 100%; }
        .nav-tab {
            height: 100%; padding: 0 20px;
            display: flex; align-items: center;
            font-size: 13px; font-weight: 700; color: var(--muted);
            cursor: pointer; transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .nav-tab.active { color: var(--orange); border-bottom-color: var(--orange); }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .page-title {
            font-family: 'Black Han Sans', sans-serif;
            font-size: clamp(28px, 5vw, 48px);
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .power-display {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px 20px;
            text-align: center;
            position: relative;
            margin-bottom: 24px;
        }

        .power-num {
            font-size: clamp(70px, 15vw, 120px);
            font-weight: 800;
            line-height: 1;
            color: var(--text);
            text-shadow: 0 0 20px var(--orange);
            font-variant-numeric: tabular-nums;
        }

        .rank-name-display {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 24px;
            margin-top: 10px;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) { .calc-grid { grid-template-columns: 1fr; } }

        .card { background: var(--surface); border: 1px solid var(--border2); padding: 24px; }
        .card-title { font-size: 12px; color: var(--orange); font-weight: 700; margin-bottom: 20px; border-left: 3px solid var(--orange); padding-left: 10px; }

        input {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border2);
            color: #fff; padding: 12px;
            font-family: 'Rajdhani', sans-serif; font-size: 18px;
            outline: none;
        }
        input:focus { border-color: var(--orange); }

        .lift-reps { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }
        .rm-result { font-size: 12px; color: var(--orange2); margin-top: 8px; min-height: 1em; }

        .submit-area { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .calc-btn {
            flex: 2; background: var(--orange); color: #000;
            border: none; padding: 16px; font-weight: 800; cursor: pointer;
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase;
        }
        .rank-only-btn { flex: 1; background: transparent; color: var(--muted); border: 1px solid var(--border2); cursor: pointer; }

        .rank-entry {
            display: grid; grid-template-columns: 50px 1fr auto;
            background: var(--surface); padding: 15px;
            margin-bottom: 4px; align-items: center;
        }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--orange); color: #000; padding: 10px 30px;
            font-weight: 700; border-radius: 4px; display: none; z-index: 10000;
        }
    </style>
</head>
<body>

<div class="bg-fx"></div>

<nav>
    <div class="nav-logo">⚡ IRON SCOUTER</div>
    <div class="nav-tabs">
        <div class="nav-tab active" id="tab-calc" onclick="showPage('calc')">計測</div>
        <div class="nav-tab" id="tab-ranking" onclick="showPage('ranking')">ランキング</div>
    </div>
</nav>

<div class="container">
    <div class="page active" id="page-calc">
        <h1 class="page-title">戦闘力を計測せよ</h1>
        <div class="power-display">
            <div class="power-num" id="power-num">0</div>
            <div class="rank-name-display" id="rank-name-display">計測待機中</div>
        </div>

        <div class="calc-grid">
            <div class="card">
                <div class="card-title">基本スペック</div>
                <div class="field"><label>体重 (kg)</label><input type="number" id="weight" oninput="onInput()"></div>
                <div class="field"><label>トレーニング歴 (年)</label><input type="number" id="years" step="0.5" oninput="onInput()"></div>
            </div>

            <div class="card">
                <div class="card-title">BIG3実績</div>
                <div class="field">
                    <label>ベンチプレス</label>
                    <div class="lift-reps"><input type="number" id="bench-kg" oninput="onLift('bench')"><span>×</span><input type="number" id="bench-reps" oninput="onLift('bench')"></div>
                    <div class="rm-result" id="rm-bench"></div>
                </div>
                <div class="field">
                    <label>スクワット</label>
                    <div class="lift-reps"><input type="number" id="squat-kg" oninput="onLift('squat')"><span>×</span><input type="number" id="squat-reps" oninput="onLift('squat')"></div>
                    <div class="rm-result" id="rm-squat"></div>
                </div>
                <div class="field">
                    <label>デッドリフト</label>
                    <div class="lift-reps"><input type="number" id="dead-kg" oninput="onLift('dead')"><span>×</span><input type="number" id="dead-reps" oninput="onLift('dead')"></div>
                    <div class="rm-result" id="rm-dead"></div>
                </div>
            </div>

            <div class="submit-area">
                <input type="text" id="nickname" placeholder="ニックネーム" style="flex: 1;">
                <button class="calc-btn" onclick="calcAndRegister()">⚡ 計測 ＆ 登録</button>
            </div>
        </div>
    </div>

    <div class="page" id="page-ranking">
        <h1 class="page-title">世界順位</h1>
        <div id="rank-list"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // --- 既存のロジック ---
    const RANKS = [
        { min: 0, max: 999, name: "修行前の凡人", color: "#888" },
        { min: 1000, max: 4999, name: "目覚めし者", color: "#4fc3f7" },
        { min: 5000, max: 14999, name: "鋼の戦士", color: "#66bb6a" },
        { min: 15000, max: 29999, name: "鉄の化身", color: "#ffca28" },
        { min: 30000, max: 59999, name: "伝説の怪力士", color: "#ffa726" },
        { min: 60000, max: Infinity, name: "宇宙最強の鋼", color: "#ff2222" }
    ];

    let rm = { bench: 0, squat: 0, dead: 0 };

    function epley(kg, reps) {
        if (!kg || kg <= 0) return 0;
        return reps > 1 ? Math.round(kg * (1 + reps / 30)) : kg;
    }

    function onLift(name) {
        const kg = parseFloat(document.getElementById(`${name}-kg`).value) || 0;
        const reps = parseFloat(document.getElementById(`${name}-reps`).value) || 1;
        rm[name] = epley(kg, reps);
        document.getElementById(`rm-${name}`).textContent = rm[name] > 0 ? `推定1RM: ${rm[name]}kg` : '';
        onInput();
    }

    function onInput() {
        const bw = parseFloat(document.getElementById('weight').value) || 0;
        const years = parseFloat(document.getElementById('years').value) || 0;
        if (bw > 0 && (rm.bench || rm.squat || rm.dead)) {
            const total = Math.round(((rm.bench/bw)*3000 + (rm.squat/(bw*1.4))*3500 + (rm.dead/(bw*1.7))*4000) * (1+Math.min(years*0.1, 1.0)));
            updateDisplay(total);
        }
    }

    function updateDisplay(power) {
        const el = document.getElementById('power-num');
        el.textContent = power.toLocaleString();
        const rank = RANKS.find(r => power >= r.min && power <= r.max) || RANKS[0];
        const rankEl = document.getElementById('rank-name-display');
        rankEl.textContent = rank.name;
        rankEl.style.color = rank.color;
        el.style.textShadow = `0 0 20px ${rank.color}`;
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`page-${id}`).classList.add('active');
        document.getElementById(`tab-${id}`).classList.add('active');
        if(id === 'ranking') renderRanking();
    }

    function saveEntry(nick, power) {
        const entries = JSON.parse(localStorage.getItem('iron_scouter_v1') || '[]');
        entries.push({ nick, power, ts: Date.now() });
        entries.sort((a, b) => b.power - a.power);
        localStorage.setItem('iron_scouter_v1', JSON.stringify(entries.slice(0, 50)));
    }

    function renderRanking() {
        const entries = JSON.parse(localStorage.getItem('iron_scouter_v1') || '[]');
        const list = document.getElementById('rank-list');
        list.innerHTML = entries.length === 0 ? '<p style="text-align:center; color:var(--muted);">データなし</p>' : 
            entries.map((e, i) => `<div class="rank-entry"><div>#${i+1}</div><div><b>${e.nick}</b></div><div style="color:var(--orange); font-weight:800;">${e.power.toLocaleString()}</div></div>`).join('');
    }

    function calcAndRegister() {
        const power = parseInt(document.getElementById('power-num').textContent.replace(/,/g, ''));
        const nick = document.getElementById('nickname').value.trim();
        if (!nick || power <= 0) return alert('入力不足です');
        saveEntry(nick, power);
        showToast(`登録完了！`);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }
</script>
</body>
</html>
